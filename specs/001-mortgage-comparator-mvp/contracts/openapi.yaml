openapi: 3.1.0
info:
  title: Batalla IAS Mortgage Analysis API
  version: 0.1.0
  description: >
    Contrato del MVP para crear análisis hipotecarios, comparar escenarios,
    evaluar la asequibilidad del escenario recomendado y gestionar acceso,
    retención y trazabilidad de reglas/fórmulas. Fuera de desarrollo local,
    el transporte es HTTPS y el acceso a un análisis depende de la cookie
    opaca `analysis_session`, no solo de `analysisId`.
servers:
  - url: https://api.example.com
    description: Placeholder production server
tags:
  - name: analyses
components:
  securitySchemes:
    AnalysisSessionCookie:
      type: apiKey
      in: cookie
      name: analysis_session
      description: >
        Cookie opaca emitida en POST /api/v1/analyses. Para `session_only` es
        de sesión con expiración máxima de 4 horas de inactividad; para
        `save_analysis` persiste hasta 30 días como máximo.
  parameters:
    AnalysisId:
      name: analysisId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Request failed validation or consistency checks
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Missing or invalid `analysis_session` cookie
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreateAnalysisRequest:
      type: object
      required:
        - retentionPreference
        - horizonMonths
        - currentMortgage
        - alternativeOffer
      properties:
        retentionPreference:
          type: string
          enum: [session_only, save_analysis]
          description: >
            `session_only` expira al cerrar sesión o tras 4 horas de
            inactividad; `save_analysis` dura un máximo de 30 días.
        horizonMonths:
          type: integer
          minimum: 1
        currentMortgage:
          $ref: '#/components/schemas/MortgageInput'
        alternativeOffer:
          $ref: '#/components/schemas/AlternativeOfferInput'
        switchCosts:
          type: array
          items:
            $ref: '#/components/schemas/CostInput'
        householdProfile:
          $ref: '#/components/schemas/HouseholdProfileInput'

    MortgageInput:
      type: object
      required:
        - pendingPrincipal
        - remainingMonths
        - nominalAnnualRate
      properties:
        pendingPrincipal:
          type: string
          description: Decimal monetary string in EUR
        remainingMonths:
          type: integer
          minimum: 1
        nominalAnnualRate:
          type: string
          description: Decimal percentage string
        currentInstallment:
          type: string
        recurringCosts:
          type: array
          items:
            $ref: '#/components/schemas/CostInput'

    AlternativeOfferInput:
      type: object
      required:
        - withoutBonus
      properties:
        withoutBonus:
          $ref: '#/components/schemas/OfferVariantInput'
        withBonus:
          allOf:
            - $ref: '#/components/schemas/OfferVariantInput'
          description: >
            Variante opcional. Si no existe, la comparación se realiza solo con
            `current` y `alternative_without_bonus`.

    OfferVariantInput:
      type: object
      required:
        - pendingPrincipal
        - remainingMonths
        - nominalAnnualRate
      properties:
        pendingPrincipal:
          type: string
        remainingMonths:
          type: integer
          minimum: 1
        nominalAnnualRate:
          type: string
        linkedProductsMonthlyCost:
          type: string
        bonificationRateDelta:
          type: string
        recurringCosts:
          type: array
          items:
            $ref: '#/components/schemas/CostInput'

    CostInput:
      type: object
      required:
        - costType
        - timing
        - amount
      properties:
        costType:
          type: string
          enum:
            - agency
            - notary
            - appraisal
            - management
            - cancellation_fee
            - opening_fee
            - insurance
            - linked_product
            - other
        timing:
          type: string
          enum: [upfront, monthly, annual, one_off_switch]
        amount:
          type: string
        description:
          type: string
        sourceType:
          type: string
          enum: [user_provided, inferred, calculated]

    HouseholdProfileInput:
      type: object
      required:
        - netMonthlyIncome
        - monthlyObligations
      properties:
        netMonthlyIncome:
          type: string
        monthlyObligations:
          type: string
        incomeStability:
          type: string
          enum: [stable, variable, unknown]
        notes:
          type: string

    AnalysisResponse:
      type: object
      required:
        - analysis
      properties:
        analysis:
          $ref: '#/components/schemas/Analysis'
        comparison:
          $ref: '#/components/schemas/ComparisonResult'
        affordability:
          $ref: '#/components/schemas/AffordabilityResult'

    Analysis:
      type: object
      required:
        - id
        - status
        - retentionPreference
        - accessMode
        - policyVersion
        - horizonMonths
        - dataQualityStatus
        - createdAt
        - lastAccessedAt
        - expiresAt
        - purgeAfter
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, validated, compared, saved, expired, deleted]
        retentionPreference:
          type: string
          enum: [session_only, save_analysis]
        accessMode:
          type: string
          enum: [analysis_session_cookie]
        policyVersion:
          type: string
        horizonMonths:
          type: integer
        dataQualityStatus:
          type: string
          enum: [complete, conditional_estimate, blocked]
        missingData:
          type: array
          items:
            type: string
        assumptions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastAccessedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        purgeAfter:
          type: string
          format: date-time

    ComparisonResponse:
      type: object
      required:
        - comparison
        - recommendation
      properties:
        comparison:
          $ref: '#/components/schemas/ComparisonResult'
        recommendation:
          $ref: '#/components/schemas/SwitchRecommendation'

    ComparisonResult:
      type: object
      required:
        - policyVersion
        - scenarios
        - ranking
        - scenarioCount
        - dataQualityStatus
        - explanation
        - triggeredRules
        - traceReferences
      properties:
        policyVersion:
          type: string
        scenarios:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioResult'
        ranking:
          type: array
          items:
            type: string
            enum: [current, alternative_without_bonus, alternative_with_bonus]
        scenarioCount:
          type: integer
          minimum: 2
          maximum: 3
        dataQualityStatus:
          type: string
          enum: [complete, conditional_estimate, blocked]
        explanation:
          type: string
        triggeredRules:
          type: array
          items:
            type: string
        traceReferences:
          type: array
          items:
            $ref: '#/components/schemas/TraceReference'
        absoluteDifferenceVsCurrent:
          type: object
          additionalProperties:
            type: string
        percentageDifferenceVsCurrent:
          type: object
          additionalProperties:
            type: string

    ScenarioResult:
      type: object
      required:
        - scenarioType
        - monthlyInstallment
        - totalRealCost
        - finalAmountPaid
        - costBreakdown
        - dataQualityStatus
      properties:
        scenarioType:
          type: string
          enum: [current, alternative_without_bonus, alternative_with_bonus]
        monthlyInstallment:
          type: string
        totalRealCost:
          type: string
        finalAmountPaid:
          type: string
        costBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/CostLine'
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/ExplainableValue'
        triggeredRules:
          type: array
          items:
            type: string
        assumptions:
          type: array
          items:
            type: string
        dataQualityStatus:
          type: string
          enum: [complete, conditional_estimate, blocked]

    SwitchRecommendation:
      type: object
      required:
        - policyVersion
        - recommendedAction
        - qualityStatus
        - isSwitchWorthIt
        - breakEvenReached
        - netSavingsAtHorizon
        - explanation
        - triggeredRules
        - traceReferences
      properties:
        policyVersion:
          type: string
        recommendedAction:
          type: string
          enum: [keep_current, switch_without_bonus, switch_with_bonus, insufficient_data]
        targetScenarioType:
          type:
            - string
            - 'null'
          enum: [current, alternative_without_bonus, alternative_with_bonus, null]
        qualityStatus:
          type: string
          enum: [complete, conditional_estimate, blocked]
        isSwitchWorthIt:
          type: boolean
        breakEvenReached:
          type: boolean
        breakEvenMonth:
          type:
            - integer
            - 'null'
          minimum: 1
        netSavingsAtHorizon:
          type: string
        blockingReasons:
          type: array
          items:
            type: string
        triggeredRules:
          type: array
          items:
            type: string
        traceReferences:
          type: array
          items:
            $ref: '#/components/schemas/TraceReference'
        explanation:
          type: string

    AffordabilityRequest:
      type: object
      required:
        - householdProfile
      properties:
        householdProfile:
          $ref: '#/components/schemas/HouseholdProfileInput'

    AffordabilityResponse:
      type: object
      required:
        - affordability
      properties:
        affordability:
          $ref: '#/components/schemas/AffordabilityResult'

    AffordabilityResult:
      type: object
      required:
        - policyVersion
        - evaluatedScenarioType
        - dataQualityStatus
        - explanation
        - triggeredRules
        - traceReferences
      properties:
        policyVersion:
          type: string
        evaluatedScenarioType:
          type:
            - string
            - 'null'
          enum: [current, alternative_without_bonus, alternative_with_bonus, null]
        debtRatio:
          type:
            - string
            - 'null'
        classification:
          type:
            - string
            - 'null'
          enum: [asumible, ajustada, no_asumible, null]
        dataQualityStatus:
          type: string
          enum: [complete, conditional_estimate, blocked]
        monthlyPaymentConsidered:
          type:
            - string
            - 'null'
        netMonthlyIncome:
          type:
            - string
            - 'null'
        monthlyObligations:
          type:
            - string
            - 'null'
        blockingReasons:
          type: array
          items:
            type: string
        explanation:
          type: string
        assumptions:
          type: array
          items:
            type: string
        triggeredRules:
          type: array
          items:
            type: string
        traceReferences:
          type: array
          items:
            $ref: '#/components/schemas/TraceReference'

    TraceReference:
      type: object
      required:
        - code
        - kind
        - version
        - sourceDocument
        - sourceSection
        - summary
      properties:
        code:
          type: string
        kind:
          type: string
          enum: [formula, rule]
        version:
          type: string
        sourceDocument:
          type: string
        sourceSection:
          type: string
        summary:
          type: string

    CostLine:
      type: object
      required:
        - costType
        - amount
        - timing
        - includedInTotalCost
      properties:
        costType:
          type: string
        amount:
          type: string
        timing:
          type: string
        includedInTotalCost:
          type: boolean
        description:
          type: string
        sourceType:
          type: string
          enum: [user_provided, inferred, calculated]

    ExplainableValue:
      type: object
      required:
        - name
        - value
        - sourceType
      properties:
        name:
          type: string
        value:
          type: string
        sourceType:
          type: string
          enum: [user_provided, inferred, calculated]
        explanation:
          type: string

    ErrorResponse:
      type: object
      required:
        - code
        - message
        - details
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            required:
              - field
              - reason
            properties:
              field:
                type: string
              reason:
                type: string
              severity:
                type: string
                enum: [warning, blocking]
paths:
  /api/v1/analyses:
    post:
      tags: [analyses]
      summary: Create a mortgage analysis
      operationId: createAnalysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnalysisRequest'
      responses:
        '201':
          description: >
            Analysis created. The response sets the opaque `analysis_session`
            cookie used to access this analysis.
          headers:
            Set-Cookie:
              description: >
                `analysis_session` cookie. Session-scoped for `session_only`;
                persistent up to 30 days for `save_analysis`.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/analyses/{analysisId}:
    get:
      tags: [analyses]
      summary: Get a persisted or active analysis
      operationId: getAnalysis
      security:
        - AnalysisSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/AnalysisId'
      responses:
        '200':
          description: Analysis found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Analysis not found, expired, deleted or not owned by the supplied cookie
    delete:
      tags: [analyses]
      summary: Delete analysis data
      operationId: deleteAnalysis
      security:
        - AnalysisSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/AnalysisId'
      responses:
        '204':
          description: Analysis deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Analysis not found, expired, deleted or not owned by the supplied cookie

  /api/v1/analyses/{analysisId}/compare:
    post:
      tags: [analyses]
      summary: Calculate scenario comparison and switch recommendation
      operationId: compareAnalysis
      security:
        - AnalysisSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/AnalysisId'
      responses:
        '200':
          description: Comparison calculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Analysis not found, expired, deleted or not owned by the supplied cookie

  /api/v1/analyses/{analysisId}/affordability:
    post:
      tags: [analyses]
      summary: Evaluate affordability for the recommendation target scenario
      operationId: evaluateAffordability
      security:
        - AnalysisSessionCookie: []
      parameters:
        - $ref: '#/components/parameters/AnalysisId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AffordabilityRequest'
      responses:
        '200':
          description: Affordability evaluation calculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AffordabilityResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Analysis not found, expired, deleted or not owned by the supplied cookie
